<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Personalized Greeting Videos | Birthday, Anniversary & More | prankwish.com</title>
  <meta name="description" content="Browse personalized greeting videos for birthdays, anniversaries and special moments. Fast digital delivery, real reviews, and easy booking on prankwish.com.">
  <meta name="keywords" content="personalized greeting videos, birthday video gift, custom video message, prankwish products">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://prankwish.com/products">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Personalized Greeting Videos | prankwish.com">
  <meta property="og:description" content="Explore personalized video greetings and book the perfect custom video message.">
  <meta property="og:url" content="https://prankwish.com/products">
  <meta property="og:site_name" content="prankwish.com">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Personalized Greeting Videos | prankwish.com">
  <meta name="twitter:description" content="Custom birthday and occasion video greetings with fast delivery.">

  <link rel="preload" href="/css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="/css/style.css"></noscript>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .page-header {
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      color: white;
      text-align: center;
      padding: 44px 20px;
      margin-bottom: 30px;
    }
    .page-header h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .page-header p {
      margin: 12px auto 0;
      opacity: 0.95;
      font-size: 1.08rem;
      max-width: 780px;
    }
    .products-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
  </style>
</head>
<body>
  <script defer src="/js/global-components.js"></script>

  <header class="page-header">
    <h1>Personalized Greeting Videos</h1>
    <p>Choose your product, add your details, and get a custom video greeting delivered digitally.</p>
  </header>

  <main class="products-wrapper">
    <div id="all-products"></div>
  </main>

  <script defer src="/js/product-cards.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (!window.ProductCards) return;
      window.ProductCards.render('all-products', {
        filter: 'all',
        columns: 3,
        limit: 100,
        showReviews: true,
        showDelivery: true
      });
    });
  </script>
</body>
</html>
